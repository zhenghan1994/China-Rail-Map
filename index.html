<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>中国城市轨道交通网络 v3.4</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-polylineoffset@1.1.1/leaflet.polylineoffset.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --bg: #0a0c10;
  --panel: #10141c;
  --panel2: #161b26;
  --border: #1e2535;
  --border2: #252d3d;
  --text: #dde3f0;
  --muted: #556080;
  --muted2: #7a8aaa;
  --accent: #4f8ef7;
  --op: #4fc3a1;
  --uc: #f7c948;
  --pl: #8899bb;
  --ab: #888888;
  --nat: #e05c5c;
  --intercity: #a78bfa;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'PingFang SC', 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

header {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 48px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
  z-index: 1000;
}
.logo {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 0.04em;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
}
.logo span { color: var(--muted2); font-weight: 400; }
.info-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--muted); color: var(--bg);
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 700;
  cursor: default; flex-shrink: 0;
  position: relative;
}
.info-badge:hover { background: var(--accent); }
.info-badge .info-tip {
  display: none;
  position: absolute; top: calc(100% + 6px); left: 50%;
  transform: translateX(-50%);
  background: var(--panel2); border: 1px solid var(--border2);
  color: var(--text); font-family: 'PingFang SC', 'Noto Sans SC', sans-serif;
  font-size: 11px; font-weight: 400;
  padding: 6px 10px; border-radius: 5px;
  white-space: nowrap; z-index: 3000;
  box-shadow: 0 4px 16px rgba(0,0,0,0.6);
  letter-spacing: 0;
}
.info-badge:hover .info-tip { display: block; }
.header-sep { width: 1px; height: 20px; background: var(--border); }

.search-wrap { flex: 1; max-width: 320px; position: relative; }
.search-wrap input {
  width: 100%;
  background: var(--panel2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 6px 12px 6px 32px;
  color: var(--text);
  font-family: 'PingFang SC', 'Noto Sans SC', sans-serif;
  font-size: 12px;
  outline: none;
  transition: border-color 0.2s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--muted); }
.search-icon {
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted); font-size: 12px; pointer-events: none;
}
#searchResults {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  background: var(--panel2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  max-height: 240px;
  overflow-y: auto;
  z-index: 2000;
  display: none;
}
#searchResults .sr-item {
  padding: 8px 12px;
  font-size: 12px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 2px;
}
#searchResults .sr-item:last-child { border-bottom: none; }
#searchResults .sr-item:hover { background: rgba(79,142,247,0.1); }
#searchResults .sr-name { color: var(--text); }
#searchResults .sr-sub { color: var(--muted2); font-size: 11px; }
.sr-tag {
  font-size: 9px; font-family: 'JetBrains Mono', monospace;
  padding: 1px 5px; border-radius: 2px; margin-left: 6px;
  vertical-align: middle;
}
.sr-tag-city { background: rgba(79,142,247,0.15); color: var(--accent); border: 1px solid #4f8ef744; }
.sr-tag-nat  { background: rgba(224,92,92,0.15);  color: var(--nat);    border: 1px solid #e05c5c44; }
.sr-tag-int  { background: rgba(167,139,250,0.15);color: var(--intercity); border: 1px solid #a78bfa44; }

.stat-chips { display: flex; gap: 8px; margin-left: auto; }
.chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; padding: 3px 9px;
  border-radius: 3px; border: 1px solid; white-space: nowrap;
}
.chip-op { color: var(--op); border-color: rgba(79,195,161,0.35); background: rgba(79,195,161,0.08); }
.chip-uc { color: var(--uc); border-color: rgba(247,201,72,0.35);  background: rgba(247,201,72,0.08); }
.chip-pl { color: var(--pl); border-color: rgba(136,153,187,0.35); background: rgba(136,153,187,0.08); }

.main { display: flex; flex: 1; overflow: hidden; }

.sidebar {
  width: 272px;
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden; flex-shrink: 0; z-index: 500;
  transition: width 0.25s ease, opacity 0.25s ease;
}
.sidebar.collapsed { width: 0; opacity: 0; pointer-events: none; }
.sidebar-scroll { overflow-y: auto; flex: 1; }
.sidebar-scroll::-webkit-scrollbar { width: 4px; }
.sidebar-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.sec { padding: 14px 16px; border-bottom: 1px solid var(--border); }
.sec-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 0.12em;
  color: var(--muted); text-transform: uppercase; margin-bottom: 10px;
}

.bm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.bm-btn {
  background: var(--panel2); border: 1px solid var(--border2);
  border-radius: 5px; color: var(--muted2); font-size: 11px;
  padding: 7px 6px; cursor: pointer; text-align: center;
  transition: all 0.15s; font-family: 'PingFang SC', 'Noto Sans SC', sans-serif;
}
.bm-btn:hover { border-color: var(--accent); color: var(--text); }
.bm-btn.active { border-color: var(--accent); background: rgba(79,142,247,0.12); color: var(--accent); }
.bm-icon { font-size: 16px; display: block; margin-bottom: 2px; }

.status-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; cursor: pointer; }
.status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; border: 1.5px solid; }
.status-label { font-size: 12px; flex: 1; }
.status-count { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); }
.tog {
  width: 28px; height: 16px; background: var(--border2);
  border-radius: 8px; position: relative; cursor: pointer;
  transition: background 0.2s; flex-shrink: 0;
}
.tog.on { background: var(--accent); }
.tog::after {
  content: ''; position: absolute;
  width: 10px; height: 10px; background: white; border-radius: 50%;
  top: 3px; left: 3px; transition: transform 0.2s;
}
.tog.on::after { transform: translateX(12px); }

.svc-grid { display: flex; flex-direction: column; gap: 2px; }
.svc-row {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 0; cursor: pointer; opacity: 0.35;
  transition: opacity 0.15s;
}
.svc-row.active { opacity: 1; }
.svc-swatch {
  flex-shrink: 0; width: 24px; height: 14px;
  position: relative; display: flex; align-items: center;
}
.svc-swatch-line {
  position: absolute; left: 0; right: 0; height: 3px; border-radius: 1px;
}
.svc-swatch-center {
  position: absolute; left: 0; right: 0; height: 1px;
  background: #ffffff; opacity: 0.7;
}
.svc-label { font-size: 11px; color: var(--text); flex: 1; line-height: 1.3; }

.layer-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; cursor: pointer; }
.layer-swatch { width: 20px; height: 3px; border-radius: 1px; flex-shrink: 0; }
.layer-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; border: 1.5px solid; }
.layer-label { font-size: 12px; flex: 1; }
.layer-hint { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--muted); }

.loading-bar {
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite; display: none;
}
.loading-bar.active { display: block; }
@keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

.load-status {
  font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted2);
  padding: 8px 16px; border-bottom: 1px solid var(--border); min-height: 34px;
}

.info-panel {
  padding: 12px 16px; border-top: 1px solid var(--border);
  font-size: 11px; background: var(--panel); flex-shrink: 0;
}
.info-row { display: flex; justify-content: space-between; padding: 3px 0; }
.info-key { color: var(--muted2); }
.info-val { font-family: 'JetBrains Mono', monospace; color: var(--text); font-size: 10px; }

#map { flex: 1; }

.coord-bar {
  position: absolute; bottom: 28px; right: 12px;
  background: rgba(10,12,16,0.85); border: 1px solid var(--border2);
  padding: 4px 10px; border-radius: 4px;
  font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted2);
  z-index: 1000; pointer-events: none; backdrop-filter: blur(8px);
}
.zoom-badge {
  position: absolute; bottom: 28px; right: 12px;
  transform: translateX(calc(-100% - 8px));
  background: rgba(10,12,16,0.85); border: 1px solid var(--border2);
  padding: 4px 8px; border-radius: 4px;
  font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--accent);
  z-index: 1000; pointer-events: none; backdrop-filter: blur(8px);
}

.sidebar-toggle {
  background: var(--panel2) !important; border: 1px solid var(--border2) !important;
  color: var(--muted2); width: 30px; height: 30px; border-radius: 4px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: all 0.15s;
  padding: 0; margin-top: 4px;
}
.sidebar-toggle:hover { border-color: var(--accent) !important; color: var(--text); }

/* Language toggle */
.lang-toggle {
  display: flex; align-items: center;
  background: var(--panel2); border: 1px solid var(--border2);
  border-radius: 5px; overflow: hidden; flex-shrink: 0;
}
.lang-btn {
  font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600;
  padding: 4px 9px; cursor: pointer; border: none; background: transparent;
  color: var(--muted); transition: all 0.15s; letter-spacing: 0.03em;
}
.lang-btn.active { background: var(--accent); color: #fff; }
.lang-btn:hover:not(.active) { color: var(--text); }

/* ── Mobile ───────────────────────────────────────────────── */
@media (max-width: 640px) {
  header {
    padding: 0 10px;
    gap: 8px;
    height: 44px;
  }
  .logo {
    font-size: 11px;
  }
  .logo span { display: none; }
  .stat-chips { display: none; }
  .header-sep { display: none; }
  .search-wrap { max-width: 160px; }

  .sidebar { width: 200px; }
  .sidebar.collapsed { width: 0; }
  .mobile-hidden { display: none !important; }

  .coord-bar { font-size: 9px; padding: 3px 7px; bottom: 22px; }
  .zoom-badge { font-size: 9px; padding: 3px 6px; bottom: 22px; }
}
.leaflet-tooltip {
  background: var(--panel2) !important; border: 1px solid var(--border2) !important;
  color: var(--text) !important; font-family: 'PingFang SC', 'Noto Sans SC', sans-serif !important;
  font-size: 12px !important; border-radius: 5px !important;
  padding: 6px 10px !important; box-shadow: 0 4px 16px rgba(0,0,0,0.6) !important;
  white-space: nowrap;
}
.leaflet-tooltip-top::before { border-top-color: var(--border2) !important; }
.leaflet-popup-content-wrapper {
  background: var(--panel2) !important; border: 1px solid var(--border2) !important;
  color: var(--text) !important; border-radius: 8px !important;
  box-shadow: 0 8px 32px rgba(0,0,0,0.7) !important; padding: 0 !important;
}
.leaflet-popup-content { margin: 0 !important; min-width: 240px; }
.leaflet-popup-tip { background: var(--panel2) !important; }
.leaflet-popup-close-button { color: var(--muted2) !important; top: 8px !important; right: 10px !important; }
/* Station name permanent labels */
.stn-label {
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
  color: var(--text);
  font-family: 'PingFang SC', 'Noto Sans SC', sans-serif;
  font-weight: 500;
  white-space: nowrap;
  padding: 0 !important;
}
.stn-label::before { display: none !important; }
.stn-label-op { text-shadow: 0 0 4px var(--bg), 0 0 4px var(--bg), 0 0 6px var(--bg), 0 0 6px var(--bg); }
.stn-label-uc { text-shadow: 0 0 3px #aaaaaa, 0 0 3px #aaaaaa, 0 0 3px #aaaaaa; color: var(--muted2); }
.stn-label-city     { font-size: 11px; }
.stn-label-intercity{ font-size: 12px; }
.stn-label-nat      { font-size: 14px; }

.leaflet-control-zoom a {
  background: var(--panel2) !important; color: var(--text) !important;
  border-color: var(--border2) !important;
}
.leaflet-control-zoom a:hover { background: var(--panel) !important; }

.popup-inner { padding: 14px 16px; }
.popup-accent-bar { width: 4px; position: absolute; left: 0; top: 0; bottom: 0; border-radius: 8px 0 0 8px; }
.popup-title { font-size: 14px; font-weight: 700; margin-bottom: 2px; padding-left: 8px; }
.popup-sub { font-size: 11px; color: var(--muted2); margin-bottom: 10px; padding-left: 8px; }
.popup-grid { display: grid; grid-template-columns: auto 1fr; gap: 4px 12px; font-size: 11px; }
.pk { color: var(--muted2); white-space: nowrap; }
.pv { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text); }
.status-badge {
  display: inline-block; padding: 1px 7px; border-radius: 3px;
  font-size: 10px; font-family: 'JetBrains Mono', monospace;
}
</style>
</head>
<body>

<header>
  <div class="logo" id="logoEl">中国大陆轨道交通<span class="info-badge">!<span class="info-tip">暂不含部分普速客运线路</span></span></div>
  <div class="header-sep"></div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="searchInput" data-i18n-placeholder-zh="搜索站名 / Station name…" data-i18n-placeholder-en="Search station name…" placeholder="搜索站名 / Station name…" autocomplete="off"/>
    <div id="searchResults"></div>
  </div>
  <div class="stat-chips">
    <div class="chip chip-op" id="chip-op">— 运营</div>
    <div class="chip chip-uc" id="chip-uc">— 建设</div>
    <div class="chip chip-pl" id="chip-pl">— 规划</div>
  </div>
  <div class="header-sep"></div>
  <div class="lang-toggle">
    <button class="lang-btn active" id="lang-zh" onclick="setLang('zh')">中文</button>
    <button class="lang-btn"        id="lang-en" onclick="setLang('en')">EN</button>
  </div>
</header>

<div class="main">
  <div class="sidebar" id="sidebar">
    <div class="loading-bar" id="loadingBar"></div>
    <div class="load-status" id="loadStatus">正在加载数据…</div>

    <div class="sidebar-scroll">

      <div class="sec">
        <div class="sec-title" data-i18n="basemap">底图 Basemap</div>
        <div class="bm-grid">
          <button class="bm-btn" id="bm-osm" onclick="setBasemap('osm')"><span class="bm-icon">🗺</span>OSM</button>
          <button class="bm-btn" id="bm-sat" onclick="setBasemap('sat')"><span class="bm-icon">🛰</span><span data-i18n="sat">卫星</span></button>
        </div>
        <div class="status-row" style="margin-top:8px" onclick="toggleLineColor()">
          <div class="layer-swatch" style="background:linear-gradient(90deg,#e05c5c,#4f8ef7,#4fc3a1);border-radius:2px"></div>
          <span class="status-label" data-i18n="linecolor">线路配色</span>
          <div class="tog" id="tog-linecolor"></div>
        </div>
      </div>

      <div class="sec mobile-hidden">
        <div class="status-row" onclick="toggleStatus('运营中')">
          <div class="status-dot" style="background:rgba(79,195,161,0.3);border-color:var(--op)"></div>
          <span class="status-label" data-i18n="op">运营中</span>
          <span class="status-count" id="cnt-op">—</span>
          <div class="tog on" id="tog-op"></div>
        </div>
        <div class="status-row" onclick="toggleStatus('建设中')">
          <div class="status-dot" style="background:rgba(247,201,72,0.3);border-color:var(--uc)"></div>
          <span class="status-label" data-i18n="uc">建设中 / 未使用</span>
          <span class="status-count" id="cnt-uc">—</span>
          <div class="tog on" id="tog-uc"></div>
        </div>
        <div class="status-row" onclick="toggleStatus('规划中')">
          <div class="status-dot" style="background:rgba(136,153,187,0.2);border-color:var(--pl)"></div>
          <span class="status-label" data-i18n="pl">规划中</span>
          <span class="status-count" id="cnt-pl">—</span>
          <div class="tog" id="tog-pl"></div>
        </div>
        <div class="status-row" onclick="toggleStatus('已停工')">
          <div class="status-dot" style="background:rgba(136,136,136,0.2);border-color:var(--ab)"></div>
          <span class="status-label" data-i18n="ab">已停工</span>
          <span class="status-count" id="cnt-ab">—</span>
          <div class="tog" id="tog-ab"></div>
        </div>
      </div>

      <div class="sec mobile-hidden">
        <div class="sec-title" data-i18n="layers">图层 Layers</div>

        <div class="layer-row" onclick="toggleLayer('lines')">
          <span class="layer-label" data-i18n="lyr-lines">城市轨道交通线</span>
          <div class="tog on" id="tog-lines"></div>
        </div>
        <div class="svc-grid" id="svcGrid" style="padding-left:8px;margin-bottom:6px"></div>
        <div class="layer-row" onclick="toggleLayer('stations')">
          <div class="layer-dot" style="background:#fff;border-color:#555"></div>
          <span class="layer-label" data-i18n="lyr-stations">城轨站点</span>
          <div class="tog on" id="tog-stations"></div>
        </div>

        <div class="layer-row" onclick="toggleLayer('intercitylines')">
          <div class="layer-swatch" style="background:var(--intercity)"></div>
          <span class="layer-label" data-i18n="lyr-intercitylines">都市圈市域线</span>
          <div class="tog on" id="tog-intercitylines"></div>
        </div>
        <div class="layer-row" onclick="toggleLayer('intercitystations')">
          <div class="layer-dot" style="background:#fff;border-color:#000"></div>
          <span class="layer-label" data-i18n="lyr-intercitystations">市域铁路站</span>
          <div class="tog on" id="tog-intercitystations"></div>
        </div>

        <div class="layer-row" onclick="toggleLayer('natlines')">
          <span class="layer-label" data-i18n="lyr-natlines">国家铁路线</span>
          <div class="tog on" id="tog-natlines"></div>
        </div>
        <div class="svc-grid" id="natSvcGrid" style="padding-left:8px;margin-bottom:6px"></div>
        <div class="layer-row" onclick="toggleLayer('natstations')">
          <div class="layer-dot" style="background:#fff;border-color:#000"></div>
          <span class="layer-label" data-i18n="lyr-natstations">国铁站点</span>
          <div class="tog on" id="tog-natstations"></div>
        </div>
      </div>

    </div>

    <div class="info-panel mobile-hidden">
      <div class="info-row"><span class="info-key" data-i18n="info-source">数据源</span><span class="info-val">ArcGIS</span></div>
      <div class="info-row"><span class="info-key" data-i18n="info-crs">坐标系</span><span class="info-val">EPSG:4326</span></div>
      <div class="info-row"><span class="info-key" data-i18n="info-copy">版权</span><span class="info-val">Han Zheng</span></div>
    </div>
  </div>

  <div style="position:relative;flex:1;display:flex">
    <div id="map"></div>
    <div class="zoom-badge" id="zoomBadge">z5</div>
    <div class="coord-bar" id="coordBar">—</div>
  </div>
</div>

<script>
const BASE = 'https://services7.arcgis.com/m6uLpqj7MgjPU371/arcgis/rest/services/Mainland/FeatureServer';

// ── Status helpers ────────────────────────────────────────
const STATUS_OP     = ['运营中'];
const STATUS_UC     = ['建设中','未使用'];
const STATUS_AB     = ['已停工'];
const STATUS_PL     = ['规划中'];
const STATUS_HIDDEN = ['远期规划','远景规划']; // never displayed

function isHidden(p) { return STATUS_HIDDEN.includes(p.Status); }

function statusGroup(s) {
  if (!s) return '其他';
  if (STATUS_OP.includes(s)) return '运营中';
  if (STATUS_UC.includes(s)) return '建设中';
  if (STATUS_AB.includes(s)) return '已停工';
  if (STATUS_PL.includes(s)) return '规划中';
  return '其他';

// ── Fetch ─────────────────────────────────────────────────
const FETCH_TIMEOUT_MS = 30000; // 30 s per page — enough for slow mobile connections
const FETCH_RETRIES    = 2;     // retry a timed-out page this many times before giving up

async function fetchWithTimeout(url, timeoutMs = FETCH_TIMEOUT_MS) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const r = await fetch(url, { signal: controller.signal });
    return r;
  } finally {
    clearTimeout(timer);
  }
}

async function fetchAll(layerId, outFields, where = '1=1') {
  const features = [];
  let offset = 0;
  const pageSize = 2000;
  while (true) {
    const url = `${BASE}/${layerId}/query?where=${encodeURIComponent(where)}&outFields=${encodeURIComponent(outFields)}&f=geojson&resultOffset=${offset}&resultRecordCount=${pageSize}&outSR=4326`;
    let r, data, lastErr;
    for (let attempt = 0; attempt <= FETCH_RETRIES; attempt++) {
      try {
        r = await fetchWithTimeout(url);
        if (!r.ok) throw new Error(`Layer ${layerId}: HTTP ${r.status}`);
        data = await r.json();
        if (data.error) throw new Error(`Layer ${layerId}: ${data.error.message || data.error.details?.join('; ') || JSON.stringify(data.error)}`);
        lastErr = null;
        break; // success
      } catch (err) {
        lastErr = err;
        const isTimeout = err.name === 'AbortError';
        if (!isTimeout || attempt === FETCH_RETRIES) throw new Error(
          isTimeout
            ? `Layer ${layerId} timed out after ${FETCH_RETRIES + 1} attempts — check your connection and reload`
            : err.message
        );
        console.warn(`Layer ${layerId} timeout, retrying (${attempt + 1}/${FETCH_RETRIES})…`);
      }
    }
    if (!data.features || data.features.length === 0) break;
    features.push(...data.features);
    if (data.features.length < pageSize) break;
    offset += pageSize;
  }
  return features;
}

// ── Geometry converter ────────────────────────────────────
// GeoJSON [lng,lat] → Leaflet [lat,lng], handles LineString & MultiLineString
function toLeaflet(geometry) {
  if (!geometry || !geometry.coordinates) return [];
  const c = geometry.coordinates;
  if (geometry.type === 'LineString') {
    return [c.map(p => [p[1], p[0]])];
  }
  if (geometry.type === 'MultiLineString') {
    return c.map(seg => seg.map(p => [p[1], p[0]]));
  }
  // Heuristic fallback: detect nesting depth
  if (Array.isArray(c[0])) {
    if (Array.isArray(c[0][0])) {
      return c.map(seg => seg.map(p => [p[1], p[0]])); // MultiLineString-like
    }
    return [c.map(p => [p[1], p[0]])]; // LineString-like
  }
  return [];
}

// ── Style helpers ─────────────────────────────────────────
function hexOrFallback(h, fallback) {
  if (!h) return fallback;
  const c = h.startsWith('#') ? h : '#' + h;
  return /^#[0-9A-Fa-f]{6}$/.test(c) ? c : fallback;
}
function lineOpacity(g) {
  return g === '运营中' ? 1.0 : g === '建设中' ? 1.0 : g === '已停工' ? 0.5 : 0.65;
}
function lineDash(g) {
  return g === '建设中' ? '6 4' : g === '规划中' ? '3 2' : g === '已停工' ? '4 3' : null;
}

// Centerline dash driven by interurban service status, not corridor status.
// For national rail: dashed if OpenInterurbandate is in the future, solid if active.
// For intercity lines (no OpenInterurbandate field): falls back to corridor status.
function interurbanDash(p) {
  const now = Date.now();
  const openMs  = p.OpenInterurbandate  ? new Date(p.OpenInterurbandate).getTime()  : null;
  const closeMs = p.CloseInterurbanDate ? new Date(p.CloseInterurbanDate).getTime() : null;
  if (openMs != null) {
    // Has an interurban date — dashed if not yet open, solid if active
    const active = openMs <= now && (closeMs == null || closeMs > now);
    return active ? null : lineDash('建设中');
  }
  // No interurban date — fall back to corridor status (used by intercity lines)
  return lineDash(effectiveStatus(p));
}

// Train consist visualiser — filled blocks = OperatingUnit, outline = DesignUnit
// Filled blocks are centred; when gap is odd the extra empty block goes to the right.
function trainConsistSVG(design, operating, color) {
  const d = parseInt(design);
  const o = parseInt(operating);
  if (!d || d < 1) return null;
  const W = 13, H = 9, GAP = 2;
  const totalW = d * (W + GAP) - GAP;
  const leftPad = (o > 0 && o < d) ? Math.floor((d - o) / 2) : 0;
  const rects = Array.from({ length: d }, (_, i) => {
    const x = i * (W + GAP);
    const filled = i >= leftPad && i < leftPad + o;
    const fill   = filled ? color : 'none';
    const stroke = filled ? color : 'var(--muted2)';
    return `<rect x="${x}" y="0" width="${W}" height="${H}" rx="1.5" fill="${fill}" stroke="${stroke}" stroke-width="1"/>`;
  }).join('');
  const label = (o > 0 && o !== d) ? `<text x="${totalW + 4}" y="${H - 1}" font-size="8" fill="var(--muted2)" font-family="inherit">${o}/${d}</text>` : '';
  const svgW = totalW + (label ? 28 : 0);
  return `<svg width="${svgW}" height="${H}" viewBox="0 0 ${svgW} ${H}" style="display:inline-block;vertical-align:middle">${rects}${label}</svg>`;
}

// Platform layout diagram from 站台类型 string — Style A
// Platform = solid filled slab; Track = dark slot with two distinct rail lines
function platformDiagram(code, scale) {
  if (!code) return '';
  if (!/^[|P ]+$/.test(code)) return '';

  const tokens = code.trim().split('').filter(t => t === '|' || t === 'P');
  if (!tokens.length) return '';

  const H      = 80;  // diagram height
  const PW     = 13;  // platform bar width
  const GAP_PT = 6;   // gap between platform and adjacent track
  const GAP_TT = 14;  // gap between two adjacent tracks
  const PAD    = 6;   // left/right padding
  const PAD_Y  = 8;   // top/bottom gap for platforms only

  // Compute x positions — platforms centered on their x, tracks are lines at x.
  // Gaps are measured from platform edge to track line, so account for PW/2.
  const positions = [];
  let x = PAD + PW / 2; // first slot: leave room for left half of a platform
  tokens.forEach((t, i) => {
    positions.push(x);
    if (i < tokens.length - 1) {
      const curr = tokens[i], next = tokens[i + 1];
      if      (curr === '|' && next === '|') x += GAP_TT;
      else if (curr === 'P' && next === '|') x += PW / 2 + GAP_PT;
      else if (curr === '|' && next === 'P') x += GAP_PT + PW / 2;
      else                                   x += PW + GAP_PT;
    }
  });
  const lastIsPlat = tokens[tokens.length - 1] === 'P';
  const totalW = x + (lastIsPlat ? PW / 2 : 0) + PAD;

  let els = '';

  tokens.forEach((t, i) => {
    const sx = positions[i];
    if (t === '|') {
      els += `<line x1="${sx}" y1="0" x2="${sx}" y2="${H}" stroke="#f7c948" stroke-width="2.5"/>`;
    } else {
      els += `<rect x="${sx - PW / 2}" y="${PAD_Y}" width="${PW}" height="${H - PAD_Y * 2}" fill="#556080"/>`;
    }
  });

  return `<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);overflow-x:auto">
    <div style="font-size:10px;color:var(--muted2);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px">${Tpk('plattype')}${scale ? ` <span style="text-transform:none;letter-spacing:0">(${scale})</span>` : ''}</div>
    <svg width="${totalW}" height="${H}" viewBox="0 0 ${totalW} ${H}" style="display:block;background:#10141c;border:1px solid var(--border2);border-radius:3px">${els}</svg>
  </div>`;
}

// Track weight/offset helper
// base: the layer's default weight (x)
// Returns { weight, offset } based on TrackNumber / TotalTrackNumber
function trackStyle(p, base) {
  const tn  = p.TrackNumber      != null ? Number(p.TrackNumber)      : null;
  const ttn = p.TotalTrackNumber != null ? Number(p.TotalTrackNumber) : null;
  if (tn === 1 && ttn === 1)          return { weight: base, offset: 0 };               // single track, single total
  if (tn != null && ttn === 2 * tn)   return { weight: base, offset: -(base * 0.5) };   // one half of a double — offset left by half weight
  if (tn === 0 || (tn != null && tn >= 2)) return { weight: base * 2, offset: 0 };      // multi/combined
  return { weight: base, offset: 0 };                                                    // unknown
}

// Layer 4 — 国家铁路线: no ServiceType filter, tooltip from Name/SegmentName
function drawNatLines() {
  natLinesGroup.clearLayers();
  allNatLines.forEach(f => {
    const p = f.properties;
    if (isHidden(p) || !visStatus[effectiveStatus(p)]) return;
    if (!visNatService[natSvcCategory(p)]) return;
    let color;
    if (p.ServiceType === 'Regional Passenger Rail') color = '#73B2FF';
    else if (p.ServiceType === 'National Rail')       color = '#FF7F7F';
    else                                               color = '#e05c5c';
    const coords = toLeaflet(f.geometry);
    if (!coords.length) return;
    const { weight, offset } = trackStyle(p, 2);

    // White centerline weight (Arcade logic)
    const tn  = p.TrackNumber      != null ? Number(p.TrackNumber)      : null;
    const ttn = p.TotalTrackNumber != null ? Number(p.TotalTrackNumber) : null;
    const clWeight = (tn == null || tn > 1) ? 1 : Math.min(2, tn) * 0.5;
    // White centerline offset (Arcade logic) — positive = right
    const clOffset = (tn == null || tn > 1 || tn === ttn) ? 0 : (2 - tn) * 0.5;

    const dash = lineDash(effectiveStatus(p));
    // For dashed lines, draw a white underline first so gaps appear white not transparent
    if (dash) {
      L.polyline(coords, {
        color: '#ffffff', weight,
        opacity: 0.9,
        lineCap: 'butt', lineJoin: 'bevel',
        offset,
        renderer: canvasRenderer,
        interactive: false,
      }).addTo(natLinesGroup);
    }
    const pl = L.polyline(coords, {
      color, weight,
      opacity: lineOpacity(effectiveStatus(p)),
      dashArray: dash,
      ...(dash ? { lineCap: 'butt', lineJoin: 'bevel' } : {}),
      offset,
      renderer: canvasRenderer,
    });
    pl.bindTooltip(p.Name || p.SegmentName || '线路', { sticky: true });
    pl.bindPopup(natLinePopup(p, color), { maxWidth: 320 });
    natLinesGroup.addLayer(pl);

    // White centerline overlay — only if interurban service is currently active or pending
    const now = Date.now();
    const openMs  = p.OpenInterurbandate  ? new Date(p.OpenInterurbandate).getTime()  : null;
    const closeMs = p.CloseInterurbanDate ? new Date(p.CloseInterurbanDate).getTime() : null;
    const interurbanActive = openMs != null && (closeMs == null || closeMs > now);
    if (interurbanActive) {
      const clDash = interurbanDash(p);
      const cl = L.polyline(coords, {
        color: '#ffffff',
        weight: clWeight,
        opacity: lineOpacity(effectiveStatus(p)),
        dashArray: clDash,
        ...(clDash ? { lineCap: 'butt', lineJoin: 'bevel' } : {}),
        offset: offset + clOffset,
        renderer: canvasRenderer,
        interactive: false,
      });
      natLinesGroup.addLayer(cl);
    }
  });
}

// Returns Set of feature indices that should display a permanent name label.
// Features sharing a name within thresholdM metres are treated as the same
// transfer station — only the first occurrence gets a label.
function labelSet(features, thresholdM) {
  const seen = new Map(); // name → [lat, lng] of first occurrence
  const show = new Set();
  features.forEach((f, i) => {
    const name = f.properties.Name;
    if (!name || !f.geometry) return;
    const [lng, lat] = f.geometry.coordinates;
    if (!seen.has(name)) {
      seen.set(name, [lat, lng]);
      show.add(i);
    } else {
      const [slat, slng] = seen.get(name);
      const dist = L.latLng(lat, lng).distanceTo(L.latLng(slat, slng));
      if (dist > thresholdM) {
        // Different station that happens to share a name (different city etc.)
        show.add(i);
      }
      // else: same transfer station cluster — skip label
    }
  });
  return show;
}

// Shared label placement pool — instantiated once per full redraw, passed into all three draw functions.
// Higher-zoom-threshold layers (nat, intercity) should add to it first so they claim priority.
let sharedLabelPool = [];

function resetLabelPool() { sharedLabelPool = []; }

// Label placement — tries top, right, bottom, left in order and picks first
// direction whose approximate bounding box (+ padding) doesn't overlap already-placed labels.
// Falls back to right if all directions overlap.
function pickLabelDir(latlng, name, fontSize, pool) {
  const pt  = map.latLngToContainerPoint(latlng);
  const W   = name.length * fontSize * 0.62;
  const H   = fontSize * 1.4;
  const off = 6;
  const pad = 2;
  const candidates = [
    { dir: 'top',    b: [pt.x - W/2 - pad,     pt.y - off - H - pad, pt.x + W/2 + pad,     pt.y - off + pad      ] },
    { dir: 'right',  b: [pt.x + off - pad,      pt.y - H/2 - pad,     pt.x + off + W + pad, pt.y + H/2 + pad      ] },
    { dir: 'bottom', b: [pt.x - W/2 - pad,      pt.y + off - pad,     pt.x + W/2 + pad,     pt.y + off + H + pad  ] },
    { dir: 'left',   b: [pt.x - off - W - pad,  pt.y - H/2 - pad,     pt.x - off + pad,     pt.y + H/2 + pad      ] },
  ];
  for (const c of candidates) {
    const [ax1,ay1,ax2,ay2] = c.b;
    const free = !pool.some(([bx1,by1,bx2,by2]) =>
      !(ax2 < bx1 || ax1 > bx2 || ay2 < by1 || ay1 > by2)
    );
    if (free) { pool.push(c.b); return c.dir; }
  }
  pool.push(candidates[1].b); // fallback: right
  return 'right';
}

function stationStyleFor(g, { weight, radius } = {}) {
  if (g === '运营中') return { fillColor:'#ffffff', color:'#000000', fillOpacity:1,   weight: weight ?? 0.5,  radius: radius ?? 2.5 };
  if (g === '建设中') return { fillColor:'#ffffff', color:'#aaaaaa', fillOpacity:1,   weight: weight ?? 0.5,  radius: radius ?? 2.5 };
  if (g === '已停工') return { fillColor:'#888888', color:'#555555', fillOpacity:0.5, weight: weight ?? 0.5,  radius: radius ?? 2.5 };
  return                     { fillColor:'#cccccc', color:'transparent', fillOpacity:0.8, weight: 0, radius: radius ?? 1.5 };
}

function drawCityStations() {
  stationsGroup.clearLayers();
  const zoom = map.getZoom();
  if (zoom < 12) return;
  const bounds = map.getBounds();
  const visible = allStations.filter(f => {
    const p = f.properties;
    if (isHidden(p) || !visStatus[effectiveStatus(p)]) return false;
    if (p.Service && !visService[p.Service]) return false;
    return true;
  });
  const inView = zoom >= 14 ? visible.filter(f => {
    const [lng, lat] = f.geometry.coordinates;
    return bounds.contains([lat, lng]);
  }) : [];
  const labelIdxSet = inView.length ? labelSet(inView, 300) : new Set();
  const labelFeatureSet = new Set(Array.from(labelIdxSet).map(i => inView[i]));

  // Build transfer index: name → count of visible entries within 300m of first occurrence
  const transferNames = new Set();
  const nameFirst = new Map();
  visible.forEach(f => {
    const name = f.properties.Name;
    if (!name || !f.geometry) return;
    const [lng, lat] = f.geometry.coordinates;
    if (!nameFirst.has(name)) { nameFirst.set(name, [lat, lng]); return; }
    const [flat, flng] = nameFirst.get(name);
    if (L.latLng(lat, lng).distanceTo(L.latLng(flat, flng)) <= 300) transferNames.add(name);
  });

  // uses sharedLabelPool
  visible.forEach(f => {
    const p = f.properties;
    const g = effectiveStatus(p);
    const [lng, lat] = f.geometry.coordinates;
    const isTransfer = g === '运营中' && transferNames.has(p.Name);
    const style = { ...stationStyleFor(g, { radius: 2.5 }) };
    if (isTransfer) style.color = '#000000';
    const m = L.circleMarker([lat, lng], { ...style, renderer: canvasRenderer });
    m.bindPopup(cityStationPopup(p), { maxWidth: 400, autoPan: true });
    stationsGroup.addLayer(m);
    if (labelFeatureSet.has(f) && p.Name) {
      const dir = pickLabelDir([lat, lng], p.Name, 11, sharedLabelPool);
      m.bindTooltip(p.Name, { permanent: true, direction: dir, className: `stn-label stn-label-city ${g === '运营中' ? 'stn-label-op' : 'stn-label-uc'}`, offset: [4, 0] });
    } else {
      m.bindTooltip(p.Name || '站', { sticky: true });
    }
  });
}

function drawNatStations() {
  natStationsGroup.clearLayers();
  const zoom = map.getZoom();
  if (zoom < 6) return;
  const bounds = map.getBounds();
  const visible = allNatStations.filter(f => {
    if (isHidden(f.properties) || !visStatus[effectiveStatus(f.properties)]) return false;
    if (!f.geometry || !f.geometry.coordinates) return false;
    // Interurban-service national stations follow intercity zoom gate
    if (f.properties.Service === 'Interurban Rail' && zoom < 10) return false;
    return true;
  });
  // Labels: non-interurban at z>=10, interurban at z>=12
  const inViewNat = zoom >= 10 ? visible.filter(f => {
    if (f.properties.Service === 'Interurban Rail') return false;
    const [lng, lat] = f.geometry.coordinates;
    return bounds.contains([lat, lng]);
  }) : [];
  const inViewInterurban = zoom >= 12 ? visible.filter(f => {
    if (f.properties.Service !== 'Interurban Rail') return false;
    const [lng, lat] = f.geometry.coordinates;
    return bounds.contains([lat, lng]);
  }) : [];
  const labelNatSet       = new Set(Array.from(labelSet(inViewNat,       1000)).map(i => inViewNat[i]));
  const labelInterurbanSet= new Set(Array.from(labelSet(inViewInterurban, 500)).map(i => inViewInterurban[i]));

  // uses sharedLabelPool
  visible.forEach(f => {
    const p = f.properties;
    const g = effectiveStatus(p);
    const [lng, lat] = f.geometry.coordinates;
    const natRadius = zoom >= 10 ? 2.5 : 2;
    const natWeight = g === '运营中' ? 1 : 0.75;
    const m = L.circleMarker([lat, lng], {
      ...stationStyleFor(g, { weight: natWeight, radius: natRadius }),
      renderer: canvasRenderer,
    });
    m.bindPopup(natStationPopup(p), { maxWidth: 400, autoPan: true });
    natStationsGroup.addLayer(m);
    const isInterurban = p.Service === 'Interurban Rail';
    const labelSet_ = isInterurban ? labelInterurbanSet : labelNatSet;
    if (labelSet_.has(f) && p.Name) {
      const dir = pickLabelDir([lat, lng], p.Name, 14, sharedLabelPool);
      m.bindTooltip(p.Name, { permanent: true, direction: dir, className: `stn-label stn-label-nat ${g === '运营中' ? 'stn-label-op' : 'stn-label-uc'}`, offset: [4, 0] });
    } else {
      m.bindTooltip(p.Name || '国铁站', { sticky: true });
    }
  });
}

function drawIntercityStations() {
  intercityStationsGroup.clearLayers();
  const zoom = map.getZoom();
  if (zoom < 10) return;
  const bounds = map.getBounds();
  const visible = allIntercityStations.filter(f => {
    const p = f.properties;
    if (isHidden(p) || !visStatus[effectiveStatus(p)]) return false;
    if (!f.geometry || !f.geometry.coordinates) return false;
    const g = effectiveStatus(p);
    if (zoom < 11 && g === '规划中') return false;
    return true;
  });
  const inView = zoom >= 12 ? visible.filter(f => {
    const [lng, lat] = f.geometry.coordinates;
    return bounds.contains([lat, lng]);
  }) : [];
  const labelIdxSet = inView.length ? labelSet(inView, 500) : new Set();
  const labelFeatureSet = new Set(Array.from(labelIdxSet).map(i => inView[i]));
  // uses sharedLabelPool
  visible.forEach(f => {
    const p = f.properties;
    const g = effectiveStatus(p);
    const [lng, lat] = f.geometry.coordinates;
    const m = L.circleMarker([lat, lng], { ...stationStyleFor(g), renderer: canvasRenderer });
    m.bindPopup(intercityStationPopup(p), { maxWidth: 400, autoPan: true });
    intercityStationsGroup.addLayer(m);
    if (labelFeatureSet.has(f) && p.Name) {
      const dir = pickLabelDir([lat, lng], p.Name, 12, sharedLabelPool);
      m.bindTooltip(p.Name, { permanent: true, direction: dir, className: `stn-label stn-label-intercity ${g === '运营中' ? 'stn-label-op' : 'stn-label-uc'}`, offset: [4, 0] });
    }
  });
}

// ── Toggles ───────────────────────────────────────────────
function toggleStatus(group) {
  visStatus[group] = !visStatus[group];
  const ids = { '运营中':'tog-op','建设中':'tog-uc','规划中':'tog-pl','已停工':'tog-ab' };
  document.getElementById(ids[group]).classList.toggle('on', visStatus[group]);
  redrawAll();
}

const LAYER_MAP = {
  lines:              { group: linesGroup,             draw: drawLines },
  stations:           { group: stationsGroup,          draw: drawCityStations },
  natlines:           { group: natLinesGroup,          draw: drawNatLines },
  natstations:        { group: natStationsGroup,       draw: drawNatStations },
  intercitylines:     { group: intercityLinesGroup,    draw: drawIntercityLines },
  intercitystations:  { group: intercityStationsGroup, draw: drawIntercityStations },
};

function toggleLayer(name) {
  visLayer[name] = !visLayer[name];
  document.getElementById('tog-' + name).classList.toggle('on', visLayer[name]);
  const { group, draw } = LAYER_MAP[name];
  if (visLayer[name]) { map.addLayer(group); draw(); }
  else map.removeLayer(group);
}

function redrawAll() {
  resetLabelPool();
  if (visLayer.lines)             drawLines();
  if (visLayer.intercitylines)    drawIntercityLines();
  if (visLayer.natstations)       drawNatStations();
  if (visLayer.intercitystations) drawIntercityStations();
  if (visLayer.stations)          drawCityStations();
  updateChips();
}

function natSvcCategory(p) {
  const isRPR   = p.ServiceType === 'Regional Passenger Rail';
  const hasOpen = p.OpenInterurbandate  != null && p.OpenInterurbandate  !== '';
  const hasClose= p.CloseInterurbanDate != null && p.CloseInterurbanDate !== '';
  const now     = Date.now();
  const openMs  = hasOpen  ? new Date(p.OpenInterurbandate).getTime()  : null;
  const closeMs = hasClose ? new Date(p.CloseInterurbanDate).getTime() : null;
  const active  = openMs != null && openMs <= now && (closeMs == null || closeMs > now);
  const planned = openMs != null && openMs >  now;
  if (isRPR) return active ? 'rpr-iu' : planned ? 'rpr-iu-pl' : 'rpr';
  return              active ? 'nr-iu'  : planned ? 'nr-iu-pl'  : 'nr';
}

function buildNatServiceButtons() {
  const grid = document.getElementById('natSvcGrid');
  grid.innerHTML = '';
  // Only show categories that have at least one feature
  const present = new Set(allNatLines.map(f => natSvcCategory(f.properties)));
  NAT_SVC_DEFS.filter(d => present.has(d.id)).forEach(d => {
    const label = lang === 'zh' ? d.zh : d.en;
    const row = document.createElement('div');
    row.className = 'svc-row active';
    row.id = 'natsvc-' + d.id;
    row.title = d.id;
    row.innerHTML = `
      <div class="svc-swatch">
        <div class="svc-swatch-line" style="background:${d.color}"></div>
        ${d.centerline ? '<div class="svc-swatch-center"></div>' : ''}
      </div>
      <span class="svc-label">${label}</span>`;
    row.onclick = () => {
      visNatService[d.id] = !visNatService[d.id];
      row.classList.toggle('active', visNatService[d.id]);
      if (visLayer.natlines) drawNatLines();
    };
    grid.appendChild(row);
  });
}

function buildServiceButtons(types) {
  const grid = document.getElementById('svcGrid');
  grid.innerHTML = '';
  const order = Object.keys(SVC_DISPLAY);
  const sorted = [...types].sort((a, b) => {
    const ai = order.indexOf(a), bi = order.indexOf(b);
    return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
  });
  sorted.forEach(t => {
    visService[t] = true;
    const color = SVC_COLOR[t] || '#888888';
    const hasCL = SVC_CENTERLINE[t] || false;
    const label = lang === 'zh' ? (SVC_DISPLAY[t] || t) : (STRINGS.en.svc[t] || t);

    const row = document.createElement('div');
    row.className = 'svc-row active';
    row.id = 'svc-' + t;
    row.title = t;
    row.innerHTML = `
      <div class="svc-swatch">
        <div class="svc-swatch-line" style="background:${color}"></div>
        ${hasCL ? '<div class="svc-swatch-center"></div>' : ''}
      </div>
      <span class="svc-label">${label}</span>`;
    row.onclick = () => {
      visService[t] = !visService[t];
      row.classList.toggle('active', visService[t]);
      redrawAll();
    };
    grid.appendChild(row);
  });
}

function updateChips() {
  const op = allLines.filter(f => statusGroup(f.properties.Status) === '运营中').length;

// ── Search ────────────────────────────────────────────────
const searchInput   = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');

// Consolidate features with the same name that are within thresholdM of each other.
// Returns an array of { f, lines, count } where f is the representative feature,
// lines is a deduplicated list of line names, and count is the number of platforms merged.
function consolidateStations(features, lineField, thresholdM) {
  const clusters = []; // [{ rep, coords, lines, count }]
  features.forEach(f => {
    const name = f.properties.Name;
    if (!name || !f.geometry) return;
    const [lng, lat] = f.geometry.coordinates;
    const lineName = f.properties[lineField] || '';
    // Find an existing cluster with the same name within threshold
    const existing = clusters.find(c =>
      c.rep.properties.Name === name &&
      L.latLng(lat, lng).distanceTo(L.latLng(c.lat, c.lng)) <= thresholdM
    );
    if (existing) {
      existing.count++;
      if (lineName && !existing.lines.includes(lineName)) existing.lines.push(lineName);
    } else {
      clusters.push({ rep: f, lat, lng, lines: lineName ? [lineName] : [], count: 1 });
    }
  });
  return clusters;
}

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  if (q.length < 1) { searchResults.style.display = 'none'; return; }

  function matches(f) {
    const p = f.properties;
    return (p.Name && p.Name.includes(q)) ||
           (p.English_Name && p.English_Name.toLowerCase().includes(q.toLowerCase()));
  }

  const cityMatches      = allStations.filter(matches);
  const natMatches       = allNatStations.filter(matches);
  const intercityMatches = allIntercityStations.filter(matches);

  const cityClusters      = consolidateStations(cityMatches,      'line',   300);
  const natClusters       = consolidateStations(natMatches,       '线路名', 1000);
  const intercityClusters = consolidateStations(intercityMatches, '线路名',  500);

  const combined = [
    ...cityClusters.map(c      => ({ ...c, tag: T('tag-city'), cls: 'sr-tag-city', type: 'city' })),
    ...natClusters.map(c       => ({ ...c, tag: T('tag-nat'),  cls: 'sr-tag-nat',  type: 'nat'  })),
    ...intercityClusters.map(c => ({ ...c, tag: T('tag-int'),  cls: 'sr-tag-int',  type: 'int'  })),
  ].slice(0, 14);

  if (!combined.length) { searchResults.style.display = 'none'; return; }

  searchResults.innerHTML = combined.map(({ rep, lines, count, tag, cls, type }, i) => {
    const p = rep.properties;
    const loc = p.SystemLocation || p.State || '';
    const lineStr = lines.slice(0, 4).join(' · ') + (lines.length > 4 ? ' …' : '');
    const subParts = [p.English_Name || lineStr, loc].filter(Boolean);
    const countBadge = count > 1 ? ` <span style="font-size:9px;opacity:0.6">×${count}</span>` : '';
    return `<div class="sr-item" data-idx="${i}">
      <span class="sr-name">${p.Name || '—'}${countBadge}<span class="sr-tag ${cls}">${tag}</span></span>
      <span class="sr-sub">${subParts.join(' · ')}</span>
    </div>`;
  }).join('');
  searchResults.style.display = 'block';

  searchResults.querySelectorAll('.sr-item').forEach((el, i) => {
    el.onclick = () => {
      const { rep } = combined[i];
      const [lng, lat] = rep.geometry.coordinates;
      map.setView([lat, lng], 14);
      searchInput.value = rep.properties.Name || '';
      searchResults.style.display = 'none';
    };
  });
});
document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) searchResults.style.display = 'none';
});

// ── Load ──────────────────────────────────────────────────
function setLoad(msg) {
  document.getElementById('loadStatus').textContent = msg;
  document.getElementById('loadingBar').classList.toggle('active', !!msg && !msg.includes('✓'));
}

async function loadAll() {
  try {
    setLoad(T('load0'));
    allLines = await fetchAll(3, '*');
    buildServiceButtons(new Set(allLines.map(f => f.properties.ServiceType).filter(Boolean)));
    updateChips();
    drawLines();

    setLoad(T('load1')(allLines.length));
    allNatLines = await fetchAll(4, 'Name,Status,ServiceType,State,city,Region,Length,DesignSpeed,TopSpeed,OpenDate,Model,Opaerator,Owner,SegmentName,TrackNumber,RailroadCapacity,OpenInterurbandate,CloseInterurbanDate');
    allNatLines.forEach(f => { f.properties._serviceLabel = natServiceLabel(f.properties); });
    buildNatServiceButtons();
    drawNatLines();

    setLoad(T('load2')(allNatLines.length));
    allIntercityLines = await fetchAll(36, 'Name,Color,Status,ServiceType,State,city,Length,DesignSpeed,TopSpeed,OpenDate,Model,Opaerator,Owner,SegmentName,TrackNumber,TotalTrackNumber');
    drawIntercityLines();

    setLoad(T('load3')(allIntercityLines.length));
    allStations = await fetchAll(1, '*');
    drawCityStations();

    setLoad(T('load4')(allStations.length));
    allNatStations = await fetchAll(0, '*');
    drawNatStations();

    setLoad(T('load5')(allNatStations.length));
    allIntercityStations = await fetchAll(37, '*');
    drawIntercityStations();

    setLoad(T('loadDone')(allLines.length, allNatLines.length, allIntercityLines.length, allStations.length, allNatStations.length, allIntercityStations.length));

    // Apply initial language after data loaded (chips need counts)
    applyI18n();
    // Set correct initial lang button state
    document.getElementById('lang-zh').classList.toggle('active', lang === 'zh');
    document.getElementById('lang-en').classList.toggle('active', lang === 'en');

  } catch(e) {
    setLoad(T('loadErr')(e.message));
    console.error(e);
  }
}

function applyI18n() {
  // Logo — update title text and badge tooltip
  const logoEl = document.getElementById('logoEl');
  const tipEl  = logoEl.querySelector('.info-tip');
  logoEl.childNodes[0].textContent = lang === 'zh'
    ? '中国大陆轨道交通'
    : 'China Mainland Modernized Passenger Rail Network';
  tipEl.textContent = lang === 'zh'
    ? '暂不含部分普速客运线路'
    : 'conventional passenger rail service is not currently included';
  // Search placeholder
  document.getElementById('searchInput').placeholder = T('placeholder');
  // All data-i18n elements
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    el.textContent = T(key);
  });
  // All data-i18n-title elements
  document.querySelectorAll('[data-i18n-title]').forEach(el => {
    el.title = T(el.getAttribute('data-i18n-title'));
  });
  updateChips();
  // Service type legend labels (city rail)
  document.querySelectorAll('.svc-row').forEach(row => {
    const t = row.title;
    const label = lang === 'zh' ? (SVC_DISPLAY[t] || t) : (STRINGS.en.svc[t] || t);

  document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
}
